name: Build UT Click Packages

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Важно для создания релиза и загрузки файлов

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Clickable
        run: |
          python3 -m pip install --upgrade pip
          pip3 install clickable-ut

      - name: Build for ARM64
        run: clickable build --arch arm64

      - name: Build for ARMHF
        run: clickable build --arch armhf

      - name: Build for AMD64
        run: clickable build --arch amd64

      - name: Collect Click Packages
        id: collect_files
        run: |
          mkdir dist
          # Находим все собранные клик-пакеты во всех папках и копируем их в одну папку dist
          find . -name "*.click" -exec cp {} dist/ \;
          echo "Содержимое папки dist:"
          ls -l dist
          
          # Проверяем, что нашли файлы
          if [ -z "$(ls -A dist)" ]; then
            echo "Ошибка: клик-пакеты не найдены!" && exit 1
          fi

      - name: Upload Artifacts (To Actions tab)
        uses: actions/upload-artifact@v4
        with:
          name: click-packages-all
          path: dist/*.click

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') # Сработает только при пуше тега
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.click
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
